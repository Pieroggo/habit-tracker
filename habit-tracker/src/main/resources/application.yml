spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/habitdb
    username: habituser
    password: habitpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080